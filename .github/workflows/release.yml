name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build_distributions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build frontend
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*

  publish:
    needs:
      - build_distributions
    runs-on: ubuntu-latest

    if: github.repository_owner == 'planning-and-learning'

    permissions:
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          TAG=${GITHUB_REF#refs/tags/v}

          echo "Package version: $VERSION"
          echo "Git tag: $TAG"

          if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: pyproject.toml=$VERSION tag=$TAG"
            exit 1
          fi

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist

      - name: Inspect distributions
        run: find dist -maxdepth 1 -type f

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
